name: flutter_jolt
description: Rust-powered JavaScript runtime for Flutter. JSC on Apple, QuickJS elsewhere, host JS on web.
version: 0.1.0
homepage: https://github.com/rlch/jolt
repository: https://github.com/rlch/jolt
issue_tracker: https://github.com/rlch/jolt/issues

topics:
  - javascript
  - runtime
  - ffi
  - rust

environment:
  sdk: ^3.11.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  flutter_rust_bridge: 2.11.1
  freezed_annotation: ^2.4.1

dev_dependencies:
  ffi: ^2.1.3
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^2.5.2
  build_runner: ^2.4.6

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
